<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance@silkhaus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  /* ── studio palette · light ── */
  --bg:#f4f5fb; --panel:#ffffff; --panel-2:#f7f8fd; --panel-3:#eef1fb;
  --ink-strong:#15193a; --ink:#2c3350; --ink-soft:#434b6b; --ink2:#6b7393;
  --line:#e3e6f2; --line2:#edeff7; --hover:#f3f4fc; --field:#ffffff;
  --accent:#6a5cff; --accent2:#5a3ff0; --cyan:#0bb4d8; --cyan2:#0a9cbd;
  --grad:linear-gradient(135deg,#6a5cff 0%,#7b4dff 46%,#16c6e6 100%);
  --grad-soft:linear-gradient(135deg,rgba(106,92,255,.13),rgba(22,198,230,.12));
  --glow:0 6px 22px rgba(106,92,255,.30);
  /* status hues */
  --green:#10b981; --red:#f2545b; --amber:#f5a623; --violet:#7c4dff;
  --red-lt:#fdecec; --amber-lt:#fdf3e3; --green-lt:#e4f8f1; --blue-lt:#e9f0ff; --violet-lt:#efeaff;
  --moved-bg:#fff8ec;
  /* legacy aliases — kept so existing CSS/JS keeps resolving */
  --canvas:var(--bg); --card:var(--panel);
  --nav:#14173a; --nav2:#4a3fd0;
  --orange:var(--accent); --orange2:var(--accent2); --teal:var(--cyan);
  --radius:14px; --radius-sm:10px;
  --shadow:0 1px 2px rgba(20,23,58,.05),0 6px 20px rgba(20,23,58,.07);
  --shadow-lg:0 18px 50px rgba(20,23,58,.15);
  --topbar-bg:rgba(255,255,255,.72); --topbar-ink:#1b2147; --topbar-ink2:#5a6088; --topbar-line:rgba(20,23,58,.10);
}
[data-theme="dark"]{
  --bg:#0c0f20; --panel:#161a2e; --panel-2:#1a2036; --panel-3:#232b47;
  --ink-strong:#f4f6ff; --ink:#d7dcf2; --ink-soft:#b9c0de; --ink2:#99a1c4;
  --line:#2c3454; --line2:#222942; --hover:#1d2540; --field:#1a2036;
  --accent:#8071ff; --accent2:#6a5cff; --cyan:#22cfee; --cyan2:#22cfee;
  --grad:linear-gradient(135deg,#8071ff 0%,#7b4dff 46%,#22cfee 100%);
  --grad-soft:linear-gradient(135deg,rgba(128,113,255,.20),rgba(34,207,238,.16));
  --glow:0 6px 24px rgba(128,113,255,.40);
  --green:#2dd4a7; --red:#ff6b71; --amber:#f5b042; --violet:#9a7dff;
  --red-lt:rgba(242,84,91,.16); --amber-lt:rgba(245,166,35,.15); --green-lt:rgba(16,185,129,.16); --blue-lt:rgba(106,92,255,.17); --violet-lt:rgba(124,77,255,.20);
  --moved-bg:rgba(245,166,35,.12);
  --nav:#0a0d1c; --nav2:#5a4fe0;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.45);
  --shadow-lg:0 24px 60px rgba(0,0,0,.6);
  --topbar-bg:rgba(18,22,42,.66); --topbar-ink:#eef1ff; --topbar-ink2:#a7afd6; --topbar-line:rgba(255,255,255,.08);
}
/* dark badge / chip / accent legibility fixes */
[data-theme="dark"] .bdg-amber{color:#f3c178}
[data-theme="dark"] .bdg-violet{color:#c6b4ff}
[data-theme="dark"] .bdg-blue{color:#a6c0ff}
[data-theme="dark"] .bdg-green{color:#5fe0c0}
[data-theme="dark"] .bdg-red{color:#ff9ea2}
[data-theme="dark"] .bdg-teal{color:#7fe3f0;background:rgba(34,207,238,.16)}
[data-theme="dark"] .bdg-gray{background:#262e49;color:#aab2d4}
[data-theme="dark"] .chip.area{color:#a6c0ff;border-color:rgba(106,92,255,.3)}
[data-theme="dark"] .cx-Medium{color:#f3c178}[data-theme="dark"] .cx-High{color:#ff9ea2}
[data-theme="dark"] .dr{color:#5fd0e6}[data-theme="dark"] .cr{color:#f3c178}
[data-theme="dark"] .seg button.active{color:#a6c0ff}
[data-theme="dark"] .cl-ref{color:#a6c0ff}
[data-theme="dark"] .hint{color:#bcccff}[data-theme="dark"] .hint.warn{color:#ff9ea2}[data-theme="dark"] .hint.amb{color:#f3c178}
[data-theme="dark"] a{color:var(--cyan)}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Lexend',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
/* aurora backdrop — the "AI-first" glow */
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(48vw 42vw at 12% -6%, rgba(106,92,255,.20), transparent 60%),
    radial-gradient(42vw 38vw at 96% 4%, rgba(22,198,230,.16), transparent 58%),
    radial-gradient(46vw 44vw at 82% 100%, rgba(124,77,255,.14), transparent 60%);
  filter:saturate(1.05)}
[data-theme="dark"] body::before{background:
    radial-gradient(50vw 44vw at 10% -8%, rgba(128,113,255,.26), transparent 60%),
    radial-gradient(44vw 40vw at 98% 2%, rgba(34,207,238,.16), transparent 58%),
    radial-gradient(48vw 46vw at 84% 100%, rgba(124,77,255,.18), transparent 60%)}
h1,h2,h3,h4{margin:0;font-weight:600;color:var(--ink-strong)}
h1{letter-spacing:-.01em}
a{color:var(--cyan2);text-decoration:none}
.muted{color:var(--ink2);font-weight:400}
button{font-family:inherit;cursor:pointer}
::selection{background:rgba(106,92,255,.22)}

/* top bar — glass */
.topbar{background:var(--topbar-bg);-webkit-backdrop-filter:saturate(180%) blur(16px);backdrop-filter:saturate(180%) blur(16px);color:var(--topbar-ink);padding:0 24px;display:flex;align-items:center;gap:16px;height:58px;position:sticky;top:0;z-index:40;border-bottom:1px solid var(--topbar-line)}
.topbar .logo{display:flex;align-items:center;gap:11px;font-weight:700;font-size:15px;letter-spacing:-.01em;color:var(--topbar-ink)}
.topbar .logo .mk{width:30px;height:30px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;box-shadow:var(--glow)}
.topbar .spacer{flex:1}
.topbar .who{font-size:12.5px;color:var(--topbar-ink2);font-weight:400}
.topbar .btn-ghost{background:transparent;border:1px solid var(--topbar-line);color:var(--topbar-ink);padding:7px 12px;border-radius:9px;font-size:12.5px;font-weight:500;transition:background .15s,border-color .15s}
.topbar .btn-ghost:hover{background:var(--grad-soft);border-color:transparent}
.topbar .btn-ghost.icon{padding:7px 10px;font-size:14px;line-height:1}

/* nav tabs — floating pills */
.navtabs{background:var(--topbar-bg);-webkit-backdrop-filter:saturate(180%) blur(16px);backdrop-filter:saturate(180%) blur(16px);padding:9px 24px;display:flex;gap:6px;align-items:center;position:sticky;top:58px;z-index:39;border-bottom:1px solid var(--topbar-line)}
.navtabs .tab{background:transparent;border:none;color:var(--ink2);font-size:13px;font-weight:600;padding:8px 15px;border-radius:10px;display:flex;align-items:center;gap:7px;transition:color .15s,background .15s}
.navtabs .tab:hover{color:var(--ink-strong);background:var(--hover)}
.navtabs .tab.active{color:#fff;background:var(--grad);box-shadow:var(--glow)}
.navtabs .tab .cnt{background:rgba(255,255,255,.25);color:#fff;font-size:10.5px;font-weight:700;border-radius:9px;padding:1px 7px;line-height:1.5}
.navtabs .tab:not(.active) .cnt{background:var(--red);color:#fff}

/* layout */
.wrap{max-width:1240px;margin:0 auto;padding:26px 24px 80px}
.page-head{margin-bottom:18px}
.page-head h1{font-size:23px}
.page-head p{margin:6px 0 0;color:var(--ink2);max-width:780px}

/* buttons */
.btn{background:var(--grad);color:#fff;border:none;padding:9px 17px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--glow);transition:transform .12s,box-shadow .15s,filter .15s}
.btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
.btn:active{transform:translateY(0)}
.btn.sm{padding:6px 12px;font-size:12px;border-radius:9px}
.btn.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--panel);transform:translateY(-1px)}
.btn.teal{background:linear-gradient(135deg,var(--cyan),var(--cyan2))}
.row-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* cards */
.card{background:var(--panel);border:1px solid var(--line2);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:16px;transition:box-shadow .18s,transform .18s,border-color .18s}
.card:hover{box-shadow:var(--shadow-lg)}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.card-h h3{font-size:15px}
.card-h .sub{color:var(--ink2);font-size:12.5px}

/* stat tiles */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:18px}
.stat{background:var(--panel);border:1px solid var(--line2);border-left:4px solid var(--accent);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .16s,box-shadow .18s}
.stat::after{content:"";position:absolute;inset:0 0 auto auto;width:80px;height:80px;background:var(--grad-soft);border-radius:50%;transform:translate(34px,-34px);opacity:.7}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat .n{font-size:27px;font-weight:700;color:var(--ink-strong);line-height:1.1;position:relative}
.stat .l{font-size:12px;color:var(--ink2);margin-top:3px;position:relative}
.stat.amb{border-left-color:var(--amber)} .stat.warn{border-left-color:var(--red)} .stat.gr{border-left-color:var(--green)}

/* badges & chips */
.bdg{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;line-height:1.5;white-space:nowrap}
.bdg-gray{background:var(--panel-3);color:#516f90}
.bdg-amber{background:var(--amber-lt);color:#b5740f}
.bdg-violet{background:var(--violet-lt);color:#5a30d6}
.bdg-blue{background:var(--blue-lt);color:#3f4fd6}
.bdg-green{background:var(--green-lt);color:#00866f}
.bdg-red{background:var(--red-lt);color:#cf2c35}
.bdg-teal{background:rgba(11,180,216,.14);color:#0a7d8c}
.chip{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:7px;background:var(--panel-3);color:var(--ink2);border:1px solid var(--line);margin:0 4px 4px 0}
.chip.area{background:var(--blue-lt);color:#3f4fd6;border-color:transparent}
.cx-Low{background:var(--panel-3);color:#5b7388}.cx-Medium{background:var(--amber-lt);color:#b5740f}.cx-High{background:var(--red-lt);color:#cf2c35}
.fn{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:6px;background:var(--panel-3);color:#5b7388;margin:0 3px 3px 0;font-weight:500}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;font-size:11px;letter-spacing:.1px;color:var(--ink2);font-weight:600;padding:8px 10px;border-bottom:2px solid var(--line2)}
tbody td{padding:10px;border-bottom:1px solid var(--line2);vertical-align:top}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--hover)}

/* org tree */
.org-wrap{padding:8px 4px}
.org-node{display:inline-flex;flex-direction:column;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;min-width:200px;box-shadow:var(--shadow);position:relative;transition:transform .15s,box-shadow .18s}
.org-node:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.org-node.lead{border-color:var(--violet);border-top:3px solid var(--violet)}
.org-node.ext{border-color:var(--amber);border-top:3px solid var(--amber)}
.org-node .nm{font-weight:600;font-size:14px;color:var(--ink-strong)}
.org-node .rl{font-size:11.5px;color:var(--ink2)}
.org-node .areas{margin-top:4px}
.org-node .meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:2px}
.org-node.pnode{cursor:grab}
.org-node.pnode:active{cursor:grabbing}
.org-node.pnode.dragging{opacity:.4}
.org-node.pnode.moved{border-color:var(--amber);border-top:3px solid var(--amber);background:var(--moved-bg)}
.org-node.pnode.drop-on{outline:2px dashed var(--teal);outline-offset:3px;background:var(--blue-lt)}
.topdrop{border:1.5px dashed var(--line);border-radius:10px;padding:10px 14px;text-align:center;color:var(--ink2);font-size:12.5px;background:var(--panel-2);margin-bottom:8px}
.topdrop.dragover{outline:2px dashed var(--teal);outline-offset:2px;background:var(--blue-lt);color:var(--ink)}
.tree ul{list-style:none;margin:0;padding-top:20px;position:relative;display:flex;justify-content:center;gap:22px}
.tree li{list-style:none;margin:0;padding:20px 12px 0;position:relative;display:flex;flex-direction:column;align-items:center}
.tree li::before,.tree li::after{content:'';position:absolute;top:0;height:20px;border-top:2px solid var(--line)}
.tree li::before{left:50%;width:50%;border-left:2px solid var(--line)}
.tree li::after{right:50%;width:50%}
.tree li:only-child::after,.tree li:only-child::before{display:none}
.tree li:first-child::before{border:0}.tree li:last-child::after{border:0}
.tree li:last-child::before{border-right:2px solid var(--line);border-radius:0 6px 0 0}
.tree li:first-child::after{border-left:2px solid var(--line);border-radius:6px 0 0 0}
.tree ul ul::before{content:'';position:absolute;top:0;left:50%;height:20px;border-left:2px solid var(--line)}
.tree>ul{padding-top:0}.tree>ul>li:first-child::after,.tree>ul>li:last-child::before{border:0}
.tree-scroll{overflow-x:auto;padding-bottom:10px}
.ext-rail{display:flex;gap:14px;flex-wrap:wrap}

/* assign pipeline */
.pipeline{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 16px;align-items:flex-start}
.pcol{flex:0 0 250px;background:var(--panel-3);border:1px solid var(--line2);border-radius:12px;display:flex;flex-direction:column;max-height:none}
.pcol.ext{background:var(--moved-bg)}
.pcol-h{padding:11px 13px;border-bottom:1px solid var(--line2);position:sticky;top:0}
.pcol-h .nm{font-weight:600;font-size:13.5px;color:var(--ink-strong);display:flex;align-items:center;gap:7px}
.pcol-h .rl{font-size:11px;color:var(--ink2);margin-top:2px}
.pcol-h .sum{font-size:11px;color:var(--ink2);margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.pcol-body{padding:10px;display:flex;flex-direction:column;gap:9px;min-height:60px}
.pcol-body.dragover{background:var(--blue-lt);outline:2px dashed var(--teal);outline-offset:-4px;border-radius:6px}
.pcard{background:var(--panel);border:1px solid var(--line2);border-left:3px solid var(--teal);border-radius:10px;padding:10px 11px;box-shadow:var(--shadow);cursor:grab;transition:transform .12s,box-shadow .15s}
.pcard:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.pcard:active{cursor:grabbing}
.pcard.dragging{opacity:.4}
.pcard.amoved{border-left-color:var(--amber);background:var(--moved-bg)}
.pcard.anew{border-left-color:var(--teal);border-left-width:3px;background:var(--panel-2);border-style:dashed}
.mdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--amber);margin-right:6px;vertical-align:middle}
.pcard-ctl{display:flex;gap:4px;margin-top:8px;padding-top:7px;border-top:1px dashed var(--line2)}
.pcard-ctl .ico{flex:0 0 auto;width:24px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;border:1px solid var(--line2);background:var(--panel);border-radius:7px;color:var(--ink2);cursor:pointer;padding:0}
.pcard-ctl .ico:hover:not(:disabled){background:var(--hover);color:var(--accent);border-color:var(--accent)}
.pcard-ctl .ico:disabled{opacity:.3;cursor:default}
.pcard-ctl .ico.del{margin-left:auto}
.pcard-ctl .ico.del:hover{background:var(--red-lt);color:#cf2c35;border-color:#f2c0c4}
.pcard.ppl{border-left-color:var(--violet,#7c4dff)}
.pcard.ppl.moved{border-left-color:var(--amber);background:var(--moved-bg)}
.pcard.drop-on{outline:2px dashed var(--teal);outline-offset:2px;background:var(--blue-lt)}
.pcol.top{background:var(--blue-lt);border-color:transparent}
.pcard .pt{font-weight:500;font-size:12.5px;color:var(--ink-strong);line-height:1.35}
.pcard .pm{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:7px}
.pcard .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.pdrag-hint{font-size:11.5px;color:var(--ink2);background:var(--blue-lt);border:1px solid transparent;border-radius:8px;padding:8px 12px;margin-bottom:14px}

/* process / SOP */
.proc-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.proc-pill{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:8px 14px;border-radius:20px;font-size:12.5px;font-weight:500;transition:border-color .15s,color .15s,transform .12s}
.proc-pill:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.proc-pill.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:var(--glow)}
.seg{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--line);border-radius:10px;overflow:hidden;width:fit-content;background:var(--panel)}
.seg button{background:var(--panel);border:none;border-right:1px solid var(--line);padding:8px 16px;font-size:12.5px;font-weight:500;color:var(--ink2);transition:background .15s,color .15s}
.seg button:last-child{border-right:none}
.seg button.active{background:var(--blue-lt);color:#3f4fd6}
/* monthly close */
.chip.on{background:var(--grad);color:#fff;border-color:transparent}
.chip.area.on{background:var(--cyan2);color:#fff;border-color:transparent}
.cl-filter{display:flex;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.cl-filter .chip{cursor:pointer}
.cl-freq,.cl-when{display:inline-block;font-size:10.5px;font-weight:600;padding:1px 7px;border-radius:4px;border:1px solid;margin-left:6px;white-space:nowrap}
.cl-sec{border:1px solid var(--line2);border-radius:12px;background:var(--panel);margin-bottom:9px;box-shadow:var(--shadow);overflow:hidden}
.cl-sec.open{border-color:var(--line)}
.cl-sec-h{display:flex;align-items:center;gap:9px;padding:13px 15px;cursor:pointer;flex-wrap:wrap}
.cl-sec-h:hover{background:var(--panel-2)}
.cl-num{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--grad);color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.cl-name{font-weight:600;color:var(--ink-strong);font-size:14px}
.cl-count{font-size:11.5px;color:var(--ink2)}
.cl-caret{color:var(--ink2);font-size:12px;width:14px;text-align:center}
.cl-steps{border-top:1px solid var(--line2);padding:8px 15px 14px;background:var(--panel-2)}
.cl-step{padding:11px 0;border-bottom:1px dashed var(--line2)}
.cl-step:last-child{border-bottom:none}
.cl-step-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.cl-ref{font-size:11px;font-weight:700;color:#3f4fd6;background:var(--blue-lt);border:1px solid transparent;border-radius:6px;padding:1px 6px}
.cl-step-name{font-weight:600;color:var(--ink-strong);font-size:13px}
.cl-desc{margin-top:6px;font-size:12.5px;line-height:1.5;color:var(--ink-soft);white-space:pre-line}
.cl-tl-h{margin:14px 0 6px;display:flex;align-items:center}
.cl-tl-h:first-child{margin-top:4px}
.cl-tl-row{display:flex;align-items:flex-start;gap:12px;padding:9px 6px;border-top:1px solid var(--line2)}
.cl-tl-main{flex:1 1 auto}
.cl-tl-sub{font-size:11.5px;color:var(--ink2);margin-top:3px}
.cl-tl-meta{flex:0 0 auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;max-width:220px}
/* revenue-share flow */
.flow{position:relative;margin-top:4px}
.flow-shell{display:grid;grid-template-columns:minmax(360px,1fr) minmax(420px,.95fr);gap:18px;align-items:start}
.flow-hero{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;margin-bottom:14px}
.flow-hero-card{border:1px solid var(--line2);border-radius:16px;background:linear-gradient(135deg,var(--panel),var(--panel-2));box-shadow:var(--shadow);padding:18px 20px}
.flow-hero-k{font-size:11px;font-weight:700;color:var(--teal);margin-bottom:7px}

.flow-phase{display:flex;align-items:baseline;gap:10px;margin:22px 0 12px;padding:9px 14px;border-radius:12px;background:linear-gradient(90deg,color-mix(in srgb,var(--pc) 12%,transparent),transparent 70%)}
.flow-phase:first-child{margin-top:6px}
.flow-phase-dot{width:11px;height:11px;border-radius:50%;background:var(--pc);flex:0 0 auto;align-self:center;box-shadow:0 0 0 4px color-mix(in srgb,var(--pc) 22%,transparent)}

.flow-stage::before{content:"";position:absolute;left:22px;top:36px;bottom:-15px;width:2px;background:linear-gradient(var(--pc),var(--line2));opacity:.5}
.flow-stage:last-child::before{display:none}
.flow-node{flex:0 0 auto;width:38px;height:38px;border-radius:13px;background:var(--panel);border:2px solid var(--pc);color:var(--pc);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:1;transition:transform .16s,box-shadow .16s}
.flow-stage.open .flow-node{background:var(--pc);color:#fff;transform:scale(1.06);box-shadow:0 6px 18px color-mix(in srgb,var(--pc) 40%,transparent)}

.flow-card:hover{box-shadow:var(--shadow-lg)}

.flow-h{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer}
.flow-h:hover{background:var(--panel-2)}
.flow-tt{flex:1 1 auto;min-width:0}
.flow-title{font-weight:600;color:var(--ink-strong);font-size:14.5px}
.flow-trig{font-size:12.5px;color:var(--ink-soft);margin-top:4px}
.flow-trig-lbl{font-size:10px;font-weight:700;color:var(--pc);border:1px solid var(--pc);border-radius:6px;padding:0 5px;margin-right:6px;opacity:.85}
.flow-meta{flex:0 0 auto;display:flex;align-items:center;gap:7px}
.flow-caret{color:var(--ink2);font-size:12px;width:12px;text-align:center}
.flow-body{border-top:1px solid var(--line2);padding:14px 16px;background:var(--panel-2);animation:flowIn .2s ease}

.flow-sec{margin-bottom:15px}
.flow-sec:last-child{margin-bottom:2px}

.flow-sec-sub{font-weight:500;text-transform:none;letter-spacing:0;color:var(--ink2);margin-left:5px}
.flow-treat{font-size:13px;line-height:1.6;color:var(--ink)}
table.flow-je{margin:0}
table.flow-je td.dr,table.flow-je td.cr{font-size:12px;white-space:normal}
.flow-steps{counter-reset:fs;list-style:none;padding:0;margin:0}
.flow-steps li{counter-increment:fs;position:relative;padding:8px 10px 8px 34px;border:1px solid var(--line2);border-radius:9px;margin-bottom:6px;background:var(--panel);font-size:12.5px;color:var(--ink)}
.flow-steps li::before{content:counter(fs);position:absolute;left:9px;top:8px;width:18px;height:18px;border-radius:50%;background:var(--pc);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.steps{counter-reset:s;list-style:none;padding:0;margin:0}
.steps li{counter-increment:s;position:relative;padding:12px 14px 12px 46px;border:1px solid var(--line2);border-radius:10px;margin-bottom:9px;background:var(--panel)}
.steps li::before{content:counter(s);position:absolute;left:12px;top:12px;width:24px;height:24px;border-radius:50%;background:var(--nav2);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}

.steps li .st-c{font-size:12px;color:var(--ink2);margin-top:4px;padding-left:1px;border-left:2px solid var(--green);padding:2px 0 2px 8px;margin-top:6px}
.steps.suggest li::before{background:var(--green)}
.empty-tmpl{border:1.5px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:var(--ink2);background:var(--panel-2)}
.je-table td:first-child{font-weight:500;color:var(--ink-strong)}
.dr{color:#0d7e94;font-weight:500}.cr{color:#b5740f;font-weight:500}
.je-group td{background:var(--panel-3);font-size:11px;font-weight:700;color:var(--ink2);padding:7px 10px}
.note-block{padding:12px 0;border-bottom:1px solid var(--line2)}
.note-block:last-child{border-bottom:none;padding-bottom:0}
.note-block .note-t{font-weight:600;color:var(--ink-strong);font-size:13px;margin-bottom:3px}
.note-block .note-b{font-size:12.5px;color:var(--ink2)}
.risk-card{border:1px solid var(--line2);border-left:4px solid var(--red);border-radius:11px;padding:12px 14px;margin-bottom:11px;background:var(--panel)}
.risk-card.sev-Medium{border-left-color:var(--amber)} .risk-card.sev-Low{border-left-color:var(--ink2)}
.risk-card .risk-h{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.risk-card .risk-t{font-weight:600;color:var(--ink-strong);font-size:13.5px}
.risk-card .risk-b{font-size:12.5px;color:var(--ink2);margin-bottom:8px}
.risk-card .risk-m{font-size:12.5px;color:var(--ink-strong);background:var(--green-lt);border-radius:8px;padding:8px 11px}
.risk-card .risk-m .arrow{font-weight:700;color:#00866f;margin-right:4px}

/* hint banners */
.hint{font-size:12.5px;padding:11px 15px;border-radius:10px;background:var(--blue-lt);border:1px solid transparent;color:#3f4fd6;margin-bottom:14px}
.hint.warn{background:var(--red-lt);border-color:transparent;color:#cf2c35}
.hint.amb{background:var(--amber-lt);border-color:transparent;color:#b5740f}

/* modal */
.modal{position:fixed;inset:0;background:rgba(27,42,58,.5);display:none;align-items:flex-start;justify-content:center;padding:50px 16px;z-index:60;overflow:auto}
.modal.show{display:flex}

.modal-f{padding:14px 20px;border-top:1px solid var(--line2);display:flex;justify-content:space-between;gap:10px}
.x{background:none;border:none;font-size:22px;color:var(--ink2);cursor:pointer;line-height:1}

.del-link{background:none;border:none;color:var(--red);font-size:12.5px;font-weight:500;cursor:pointer}

.ed-val{border-radius:6px;transition:background .12s,box-shadow .12s;outline:none}

.ed-tool-btn.del{color:var(--red)}.ed-tool-btn.del:hover{border-color:var(--red);background:var(--red-lt)}

.flow-addstage{margin:0 0 12px 56px}

tr:hover .rowedit{opacity:1}

/* ───────────────── v15 redesign: controller cockpit ───────────────── */
:root{
  --bg:#f6f8fb; --panel:#ffffff; --panel-2:#f9fafc; --panel-3:#eef3f8;
  --ink-strong:#172033; --ink:#2f3a4f; --ink-soft:#46556d; --ink2:#6b7890;
  --line:#d9e2ec; --line2:#e8eef5; --hover:#f2f6fa;
  --accent:#ff7a59; --accent2:#ff5c35; --cyan:#00a4bd; --cyan2:#008fa5;
  --grad:linear-gradient(135deg,#ff7a59,#ff5c35);
  --grad-soft:linear-gradient(135deg,rgba(255,122,89,.12),rgba(0,164,189,.10));
  --glow:0 10px 24px rgba(255,122,89,.20);
  --nav:#26384f; --nav2:#33475b;
  --radius:12px; --radius-sm:8px;
  --shadow:0 1px 2px rgba(23,32,51,.04),0 10px 24px rgba(23,32,51,.06);
  --shadow-lg:0 18px 50px rgba(23,32,51,.13);
  --topbar-bg:#26384f; --topbar-ink:#ffffff; --topbar-ink2:#b7c4d4; --topbar-line:rgba(255,255,255,.12);
}
[data-theme="dark"]{
  --bg:#0e1522; --panel:#151f2e; --panel-2:#1b2738; --panel-3:#223047;
  --ink-strong:#f3f7fb; --ink:#d8e1ec; --ink-soft:#bdcad9; --ink2:#8fa0b4;
  --line:#2f4057; --line2:#26364c; --hover:#1f2b3d;
  --accent:#ff8a6b; --accent2:#ff6b46; --cyan:#1cc8dc; --cyan2:#12aebf;
  --grad:linear-gradient(135deg,#ff8a6b,#ff6b46);
  --grad-soft:linear-gradient(135deg,rgba(255,138,107,.16),rgba(28,200,220,.10));
  --nav:#111a29; --nav2:#172337; --topbar-bg:#111a29;
}
body{background:var(--bg);font-size:13px}
body::before{display:none}
.topbar{position:fixed;left:0;top:0;bottom:0;width:264px;height:auto;z-index:45;display:flex;flex-direction:column;align-items:stretch;gap:12px;padding:22px 18px;background:linear-gradient(180deg,var(--nav),var(--nav2));border-right:1px solid var(--topbar-line);border-bottom:none;color:#fff;backdrop-filter:none}
.topbar .logo{font-size:15px;line-height:1.2;color:#fff;align-items:flex-start}
.topbar .logo .mk{width:34px;height:34px;border-radius:10px;background:#ff7a59;box-shadow:none}
.topbar .spacer{display:none}
.topbar .who{order:2;color:var(--topbar-ink2);font-size:11.5px;padding:8px 2px 12px;border-bottom:1px solid var(--topbar-line)}
.topbar .btn-ghost{order:5;width:100%;text-align:left;justify-content:flex-start;border-color:var(--topbar-line);color:#e8eef5;background:rgba(255,255,255,.04);box-shadow:none}
.topbar .btn-ghost:hover{background:rgba(255,255,255,.10);color:#fff}
.topbar #themeBtn{width:auto;position:absolute;right:18px;top:70px;padding:6px 9px}
.topbar button[onclick="doExport()"]{margin-top:auto}
.topbar button[onclick="resetSeed()"]{margin-bottom:4px}
.navtabs{position:fixed;left:18px;top:132px;width:228px;z-index:46;display:flex;flex-direction:column;align-items:stretch;gap:6px;padding:0;background:transparent;border:0;backdrop-filter:none}
.navtabs .tab{width:100%;justify-content:flex-start;color:#c5d1df;border-radius:10px;padding:10px 12px;font-size:12.5px}
.navtabs .tab:hover{background:rgba(255,255,255,.08);color:#fff}
.navtabs .tab.active{background:#fff;color:#223047;box-shadow:0 10px 24px rgba(0,0,0,.18)}
.navtabs .tab .tab-ico{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(255,255,255,.08);font-size:12px}
.navtabs .tab.active .tab-ico{background:var(--accent);color:#fff}
.wrap{max-width:none;margin-left:264px;padding:30px 34px 80px}
.page-head{background:linear-gradient(135deg,#fff,var(--panel-2));border:1px solid var(--line2);border-radius:18px;padding:22px 24px;box-shadow:var(--shadow);margin-bottom:18px}
[data-theme="dark"] .page-head{background:linear-gradient(135deg,var(--panel),var(--panel-2))}
.page-head h1{font-size:26px;letter-spacing:-.025em}
.page-head p{font-size:13.5px;max-width:920px;color:var(--ink2)}
.card{border-radius:14px;padding:18px 20px}
.card-h{border-bottom:1px solid var(--line2);padding-bottom:12px;margin-bottom:14px}
.card-h h3{font-size:15px;letter-spacing:-.01em}
.stats{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.stat{border-left-width:0;border-radius:14px;padding:16px 17px}
.stat::after{display:none}

/* ───────────────── v16 polish: signal-led, less narration ───────────────── */
body{

}
.wrap{position:relative}
.wrap::before{

.page-head{position:relative;overflow:hidden}
.page-head::after{

.flow-console{

}
.flow-now{

  box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;padding:16px 18px;position:relative;overflow:hidden
}
.flow-now::after{
  content:"";position:absolute;right:-30px;top:-52px;width:170px;height:170px;border:1px solid color-mix(in srgb,var(--pc) 35%,transparent);border-radius:28px;transform:rotate(18deg)
}
.flow-pulse{

.flow-mini-stats.compact .flow-mini{padding:13px 14px;border:1px solid var(--line2);background:var(--panel);box-shadow:var(--shadow)}
.flow-path{
  display:flex;gap:8px;align-items:stretch;overflow-x:auto;padding:2px 2px 12px;margin:0 0 8px;scrollbar-width:thin
}
.flow-path-node{

}
.flow-path-node::after{content:"";position:absolute;left:42px;right:-10px;top:20px;border-top:1px solid color-mix(in srgb,var(--pc) 44%,var(--line));z-index:0}
.flow-path-node:last-child::after{display:none}
.flow-path-node span{position:relative;z-index:1;display:inline-flex;width:23px;height:23px;align-items:center;justify-content:center;border-radius:8px;background:color-mix(in srgb,var(--pc) 14%,var(--panel));color:var(--pc);font-size:11px;font-weight:800;margin-bottom:6px}

.flow-path-node:hover{transform:translateY(-2px);border-color:var(--pc)}

.flow-stage-grid{align-items:stretch}
.stage-tile{position:relative;overflow:hidden}

}
.stage-tile:hover::before,.stage-tile.active::before{opacity:1}
.stage-tile .stage-num,.stage-tile .stage-title,.stage-tile .stage-trigger,.stage-tile .stage-meta{position:relative}
.stage-tile.active{box-shadow:0 14px 40px color-mix(in srgb,var(--pc) 20%,transparent);transform:translateY(-2px)}
.flow-focus{overflow:hidden;border:1px solid var(--line2);box-shadow:var(--shadow-lg)}

  {"id": "c5", "num": "5", "name": "Accounts Receivable (AR)", "owner": "Pawan", "area": "Revenue / O2C", "steps": [{"ref": "5.1", "name": "Settlement Data Ingestion", "desc": "Extract Settlement Reports:\nPayment Gateways: Download transaction-level settlement files from Stripe, Amazon Payment, and Amex.\nOTAs: Download \"Payout Reports\" from Airbnb, Booking.com, Expedia, Agoda, etc.\n\nVerify Gross vs. Net: Ensure reports show the Gross Booking Amount, the Channel Commission/Fee, and the Net Payout.\nNote: Per the FTA assessment, the \"Gross\" amount must include the 5% VAT and Tourism Fee.", "freq": "Weekly", "when": "D+4"}, {"ref": "5.2", "name": "AR Clearing & Payment Accounting", "desc": "Reconcile with AR Sub-ledger: Match the unique Booking ID from the settlement report to the corresponding Open Invoice in NetSuite.\nApply Payments in NetSuite: Use the Invoice Payments Template.\nHandle Partial Payments: If a settlement covers multiple bookings (typical for Airbnb), the payment entry must break down the credit across each specific Guest Invoice to ensure the AR Aging Report is accurate.", "freq": "Weekly", "when": "D+4"}, {"ref": "5.3", "name": "Booking.com Commission Reconciliation", "desc": "Invoice Comparison: Obtain the actual monthly commission invoice from Booking.com (usually received after month-end).\nReconcile Against Accruals: Compare the actual invoice amount to the \"Commission Accrual\" recorded during the Revenue Recognition phase\nRecord \"true\" up entries to match the accrual to the invoices", "freq": "Weekly", "when": "D+4"}, {"ref": "5.4", "name": "Transaction Processing Fee Audit", "desc": "Fee Validation: Review the \"Transaction Processing Fees\" (Stripe/Amazon Pay) against the accruals recorded based on initial bookings data.\nDifference Accounting: Account for any differences between bills and accruals", "freq": "Monthly", "when": "D+4"}, {"ref": "5.5", "name": "Reverse Charge Mechanism (RCM):", "desc": "Since Airbnb, Booking.com and Stripe are international vendors, ensure the 5% Reverse Charge VAT is applied to the final bill amount in NetSuite.", "freq": "Monthly", "when": "D+3"}, {"ref": "5.6", "name": "Bad Debt & Dispute Review", "desc": "Review all invoices aged >60 days. Consult with the BD/Operations team on \"Chargebacks\" or disputed corporate bookings.\nAccounting Entry: If uncollectible, propose a Bad Debt Provision for CFO approval. Record bad debt as a contra asset.", "freq": "Monthly", "when": "D+5"}]},
  {"id": "c6", "num": "6", "name": "Guest Refunds & Chargeback Loss Management", "owner": "Pawan", "area": "Revenue / O2C", "steps": [{"ref": "6.1", "name": "Processing Valid Guest Refunds", "desc": "Authorization: Verify the refund request against the cancellation policy in Guesty. All refunds exceeding a specific threshold (e.g., AED 1,000) must be approved by the CX/ Operations Manager", "freq": "Weekly", "when": "D+5"}, {"ref": "6.2", "name": "Method of Return", "desc": "Refunds must be processed through the original payment gateway (Stripe/Amazon Pay) to prevent \"refund fraud.\" Never issue a manual bank transfer for a credit card payment.", "freq": "Weekly", "when": "D+5"}, {"ref": "6.3", "name": "Documentation (The Credit Note)", "desc": "Generate a Tax Credit Note in NetSuite.\nLinkage: The Credit Note must explicitly reference the original Tax Invoice number.\nVAT/Tourism fee Reversal: The entry must reverse the 5% Output VAT and the Tourism Fee liability proportionally.", "freq": "Weekly", "when": "D+5"}, {"ref": "6.4", "name": "Security Deposit Refunds", "desc": "Similar to valid refunds on cancellation or modificaton of bookings, security deposit refunds should be processed on the original payment method. \nAccount for the deposit refund in Netsuite by reversing the associated asset.\nAny deductions from the security deposit amount must be supported by a valid Tax Invoice issued to the Guest.", "freq": "Weekly", "when": "D+5"}]},
  {"id": "c7", "num": "7", "name": "Managing Fraudulent Chargebacks (Dispute Lost)", "owner": "Pawan", "area": "Revenue / O2C", "steps": [{"ref": "7.1", "name": "Evidence Submission", "desc": "Upon notification from Stripe/Amex, the Finance team must compile the \"Dispute Package\":\nSigned registration card or digital check-in logs.\nCommunication logs from Guesty showing the guest stayed and did not report issues.\nThe original Tax Invoice and Tourism Fee proof of payment.", "freq": "Weekly", "when": "D+5"}, {"ref": "7.2", "name": "Accounting for Dispute Loss and Withdrawal of Funds", "desc": "When the bank forcibly withdraws the funds, Stripe will record a \"Dispute Fee\" plus the full transaction amount.\nIf the gateway notifies Silkhaus that the claim is lost: Do Not Reverse Revenue: Since the service was provided (the \"Performance Obligation\" was met), the revenue stays on the books. Record as a \"fraudulent chargeback expense\"", "freq": "Weekly", "when": "D+5"}, {"ref": "7.3", "name": "VAT Treatment on Lost Chargebacks", "desc": "Per FTA principles, if the service has been provided and the \"Bad Debt\" is realized, we may be eligible to adjust the VAT in a future return under the Bad Debt Relief rules (usually after 6 months of non-payment), provided we have proof of the loss.\nAccount and adjust in consultation with ADS.", "freq": "Weekly", "when": "D+5"}]},
  {"id": "c8", "num": "8", "name": "Expenditure & Liability Capture", "owner": "Kathleen", "area": "P2P & Landlord", "steps": [{"ref": "8.1", "name": "Multi-Channel Bill Receipt", "desc": "Email Ingestion: Monitor the accounting@silkhaus.com inbox. All vendor PDFs must be downloaded and indexed.\nBusiness Team Input: Collect ad-hoc vendor invoices (e.g., maintenance, local permits) submitted by the Operations or BD teams via Slack/email.\nAlaan Portal Sync: Download the Alaan Card transaction report. For every transaction, match the employee-uploaded receipt from the Alaan portal. Any spends over AED 100 should be supported by a valid tax bill", "freq": "Weekly", "when": "D+3"}, {"ref": "8.2", "name": "Recording & VAT Classification in NetSuite", "desc": "Upload invoices using the NetSuite Bill Upload Template.\nVAT Accounting: Local (UAE) Bills: Verify the vendor's TRN is valid. Claim 5% Input VAT. \nEnsure \"Tourism Tax\" paid by Silkhaus to the DTCM (if applicable) is coded to the liability account, not as a deductible expense.\nInternational Bills (Guesty, Airbnb, Stripe): Tag as Reverse Charge Mechanism (RCM). NetSuite will self-account for the 5% VAT (Debit Input/Credit Output).\nDimensions: Every bill must be allocated to a Unit ID, Unit Type (Lease/Revshare), and Location.", "freq": "Weekly", "when": "D+3"}, {"ref": "8.3", "name": "Reverse Charge Mechanism (RCM):", "desc": "For any international vendors, ensure the 5% Reverse Charge VAT is applied to the final bill amount in NetSuite.", "freq": "Weekly", "when": "D+3"}, {"ref": "8.4", "name": "Accrual of Missing Bills", "desc": "If a service was rendered (e.g., a month-end cleaning) but no invoice was received over email, record an Expense Accrual.", "freq": "Weekly", "when": "D+4"}]},
  {"id": "c9", "num": "9", "name": "Accounts Payable (AP)", "owner": "Kartik", "area": "P2P & Landlord", "steps": [{"ref": "9.1", "name": "Bill Payments (Bank)", "desc": "Process payments on Tuesdays, Thursdays, and Fridays. All bills must be segregated by unit, unit type (Lease vs. Revshare), and location (Dubai, Abu Dhabi, Riyadh) to ensure accurate P&L reporting.", "freq": "3/Week", "when": "D+3"}, {"ref": "9.2", "name": "Petty Cash", "desc": "Maintain a Petty Cash Register for employee transfers and classify expenses into the correct NetSuite asset or expense category.\nThis is relevant specifically when amounts are transferred to field ops agents to purchase access cards before a bill is available. Any amounts provided to employees must be followed up with a valid tax invoice to support the business expense", "freq": "Weekly", "when": "D+2"}, {"ref": "9.3", "name": "Alaan Card Expense", "desc": "On a weekly basis, download Alaan spend reports. Employees must provide valid bill copies (tax invoices mandatory for amounts greater than AED 100); the finance team must review these for inconsistencies and classify correctly as per the unit (where applicable) and location. \nUpload them to NetSuite using the Bill Upload Template.", "freq": "Weekly", "when": "D+3"}]},
  {"id": "c10", "num": "10", "name": "Revenue Share Landlord Settlement & Statutory Compliance", "owner": "Sai", "area": "P2P & Landlord", "steps": [{"ref": "10.1", "name": "Property Cost Submission & Verification", "desc": "Cost Extraction: Download actual vendor bills from NetSuite and the Alaan portal for utilities (DEWA/ADDC), maintenance (Breezeway), and recurring permits (DET/DTCM).\nValidation: Segregate \"Recoverable Costs\" (those the landlord is contractually obligated to pay) from \"Silkhaus Overheads.\"\nReview Cycle: Submit the \"Property Cost List\" to the BD and Operations teams. They must verify that maintenance charges match physical work orders completed at the unit.\nFinalization: Once approved, these costs are flagged in NetSuite for deduction against the Landlord Payable balance. Accordingly account for these costs as first a \"landlord receiveble\" and then a deduction from the \"landlord payable\" accounts", "freq": "Monthly", "when": "D-5"}, {"ref": "10.2", "name": "Inward Supply invoicing", "desc": "Accounting for the \"Purchase\": Since Silkhaus acts as the Undisclosed Agent, we effectively \"purchase\" the accommodation service from the landlord. Generate a Purchase Bill in NetSuite in the name of the Landlord for the full booking value excluding any statutory fees like tourism tax. Note that this bill is only for the accommodation services, and must exclude services directly provided by Silkhaus to the Guest (like cleaning, check in)\nVAT Requirement: If the landlord is VAT-registered, they must provide a Tax Invoice to Silkhaus for their share (including 5% VAT). If the landlord is not registered, no VAT is added to this specific payout line.", "freq": "Monthly", "when": "D+10"}, {"ref": "10.3", "name": "Management Fee & Reimbursable Invoicing", "desc": "Corresponding to each booking, unit and landlord, the following Tax invoices must be issued by Silkhaus:\n* Management fee charged by Silkhaus as per contract\n\n* Taxable Reimbursements: These items are considered taxable services provided by Silkhaus. They must be clearly invoiced with a 5% VAT breakdown.\nRepair & Maintenance: Each individual repair job must reference the specific Booking ID (if applicable) or Unit ID.\nOTA Channel Commissions: This must be recovered as a taxable reimbursement. Each line must map back to the specific Booking ID it relates to.\n\n*Out-of-Scope Disbursements\nDisbursements are pass-through costs where Silkhaus is merely the paying agent (e.g., utility bills in the landlord's name). Includes DEWA, SEWA, Gas, etc. and statutory government fees (like DTCM permits).\nThese should NEVER be invoiced as they are outside the scope of VAT. Record disbursements as accounting entries deducting the amounts from the landlord's payout", "freq": "Monthly", "when": "D+10"}, {"ref": "10.4", "name": "Payout Settlement", "desc": "Final landlord payments are scheduled and disbursement on the 15th of the following month.\nValidate the final amounts as per owner statements or revenue report from the tech team, ensuring these reconcile to balances as per Netsuite before disbursing the amounts from the bank", "freq": "Monthly", "when": "D+15"}]},
  {"id": "c11", "num": "11", "name": "UAE Payroll Execution & Reconciliation", "owner": "Alex (outside model)", "area": "Other", "steps": [{"ref": "11.1:", "name": "Salary Master Preparation", "desc": "HR prepares the master salary tab; Finance must perform a quality check on all formulas, arithmetic totals, and employee counts.", "freq": "Monthly", "when": "D+8"}, {"ref": "11.1.2:", "name": "Al Ansari WPS Processing", "desc": "For Tecom and Branch employees, payroll is processed via Al Ansari Exchange. The total payout, inclusive of transfer charges, must be reconciled back to the Salary Master.", "freq": "Monthly", "when": "D+8"}, {"ref": "11.1.3:", "name": "NBF Bank Processing", "desc": "For employees paid directly via National Bank of Fujairah (NBF), HR obtains the bank statement and reconciles the completed transfers to the Salary Master.", "freq": "Monthly", "when": "D+8"}, {"ref": "11.1.4:", "name": "Cheque Log Management", "desc": "Any salaries issued via cheque are logged in the master cheque sheet. These are marked as \"Paid\" only upon encashment as verified on the bank statement.", "freq": "Monthly", "when": "D+8"}, {"ref": "11.1.5:", "name": "Final Payout Reconciliation", "desc": "HR performs a final tie-out ensuring the sum of Al Ansari, NBF, and Cheque payments matches the validated Salary Master total.", "freq": "Monthly", "when": "D+8"}, {"ref": "11.2.1:", "name": "Payroll Bifurcation", "desc": "HR must categorize every payment into one of the following buckets:\nFixed Pay: Standard monthly salary, adjusted for any specific deductions or reimbursements.\nVariable Pay: Performance bonuses or commissions for the current month or quarter, paid either in the same month or the following.\nAccrued Pay: Standard salary for the current month that is scheduled for payment in the following month.\nEnd of Service (EOS) Pay: Final settlements or gratuity payments disbursed alongside regular monthly salaries.", "freq": "Monthly", "when": "D+8"}, {"ref": "11.2.2:", "name": "Emiratisation Accounting", "desc": "Employee Contribution: Deduct from the gross salary; this reduces the final payable amount to the employee.\nEmployer Contribution: Record as a separate personnel expense in the current period.", "freq": "Monthly", "when": "D+8"}, {"ref": "11.2.3:", "name": "Expense Recognition", "desc": "Finance records the total categorized payroll expense in the current period in NetSuite, ensuring all costs—whether paid or accrued—hit the P&L", "freq": "Monthly", "when": "D+8"}, {"ref": "11.3.1", "name": "Gratuity (End of Service Benefit) Monthly Provisioning", "desc": "Calculate the gratuity liability monthly based on the latest basic salaries in the Salary Master.", "freq": "Monthly", "when": "D+8"}, {"ref": "11.3.2", "name": "Termination Write-off", "desc": "When an employee leaves, their specific accumulated provision must be written off against the liability account.", "freq": "Monthly", "when": "D+8"}, {"ref": "11.3.3", "name": "Variance Accounting", "desc": "The difference between the actual EOS payout and the existing provision is recorded as a current-month gain or expense.", "freq": "Monthly", "when": "D+8"}, {"ref": "11.4", "name": "Leave Encashment & ESOPs", "desc": "", "freq": "", "when": "D+8"}, {"ref": "11.4.1", "name": "Annual Leave Provision", "desc": "Update the leave encashment provision annually based on the final payroll of the year; all adjustments are recorded during the December close.", "freq": "Annually", "when": "D+8"}, {"ref": "11.4.2", "name": "Share-Based Payments", "desc": "Account for ESOPs and group share-based payments on an annual basis.", "freq": "Annually", "when": "D+8"}, {"ref": "11.5", "name": "Other payroll", "desc": "", "freq": "", "when": "D+8"}, {"ref": "11.5.1", "name": "Egypt", "desc": "Account for all monthly payments to Silkhaus contractors based in Egypt, including fixed pay and variable bonues. Account for any transaction charges incurred on salary transfers accordingly", "freq": "Monthly", "when": "D+8"}, {"ref": "11.5.2", "name": "Late check-in bonuses", "desc": "Account for any bonuses provided to employees for assistance in late check in/check out", "freq": "Monthly", "when": "D+8"}, {"ref": "11.5.3", "name": "KSA Payroll", "desc": "Account for KSA payroll and EOSB. HR to provide details to Finanshels.", "freq": "Monthly", "when": "D+8"}]},
  {"id": "c12", "num": "12", "name": "Bank reconciliations", "owner": "Pawan", "area": "Treasury / Banking", "steps": [{"ref": "12.1", "name": "Complete Reconciliation", "desc": "Perform final reconciliations for all bank accounts and Alaan cards. This includes:\nLease rent payments,\nAmounts collected from landlords for onboarding and furnishing fee,\nAmounts settled with OTAs/payment processors for bookings,\nVendor bill payments for unit activation and operating costs,\nPayment of overhead costs (payroll, G&A, dues and subscriptions),\nPayments to revenue share landlords,\nPayments for furnishing inventory\nSecurity deposit received and paid (units, customers, utilities),\nOther items not included above", "freq": "Weekly", "when": "D+6"}, {"ref": "12.2", "name": "System Lock", "desc": "Ensure the \"Cash and Cash Equivalents\" balance in NetSuite matches the bank statement exactly.\nAny discrepancies must be identified and resolved on a timely basis.", "freq": "Monthly", "when": "D+6"}]},
  {"id": "c13", "num": "13", "name": "Asset Management & Margin Analysis", "owner": "Ramesh", "area": "GL & Reporting", "steps": [{"ref": "13.1", "name": "Inventory (Furniture, Fixtures & Equipment - FF&E)", "desc": "", "freq": "", "when": ""}, {"ref": "13.1.1", "name": "BOQ Reconciliation", "desc": "Obtain the Bill of Quantities (BOQs) and delivery notes from Procurement for all units that are under transformation or have reached \"Live\" status on Guesty during the month.", "freq": "Weekly", "when": "D+5"}, {"ref": "13.1.2", "name": "NetSuite Asset-to-Inventory Match", "desc": "Reconcile vendor bills (Amazon, local furniture vendors) accounted for in the Inventory Asset Account against the physical BOQ. Any items paid for but not listed in a BOQ must remain in Inventory or be investigated as potential shrinkage. Similarly any items included in the BOQ but not accounted as a vendor bill in the Inventory Asset account must be investigated and accounted.", "freq": "Weekly", "when": "D+5"}, {"ref": "13.1.3", "name": "Capitalization/Expensing", "desc": "For Lease Units: Move total unit costs from Inventory to Fixed Assets (Tangible) via Journal Entry.\nFor Revshare Units: Expense total furnishing costs to the P&L as Direct Property Costs.", "freq": "Monthly", "when": "D+6"}, {"ref": "13.1.4", "name": "VAT Check", "desc": "Ensure 5% Input VAT was correctly claimed on all purchases.", "freq": "Monthly", "when": "D+6"}, {"ref": "13.1.5", "name": "Quarterly & Annual Close", "desc": "Physical Count: Conduct a spot check of \"Central Warehouse\" inventory (spares, linens, tech kits).\nObsolescence Review: Write down damaged or outdated furniture (e.g., items removed from units during refresh) to Net Realizable Value (NRV).", "freq": "Quarterly/Annual", "when": "D+9"}, {"ref": "13.2", "name": "Tangible Assets (Property, Plant & Equipment - PP&E)", "desc": "", "freq": "", "when": ""}, {"ref": "13.2.1", "name": "Fixed Asset Register (FAR) Update", "desc": "For all units capitalized for leased units, assign Unit ID and Location tags.", "freq": "Weekly", "when": "D+5"}, {"ref": "13.2.2", "name": "Depreciation Run", "desc": "Execute the monthly depreciation journal.\nStandard Lives: Leasehold Improvements (2 years); Furniture (5 years); Appliances/Electronics (3 years).", "freq": "Monthly", "when": "D+6"}, {"ref": "13.2.3", "name": "Disposals", "desc": "Record the retirement of assets from units where the lease was terminated early and assets were disposed.", "freq": "Monthly", "when": "D+7"}, {"ref": "13.2.4", "name": "Resale", "desc": "Record the resale revenue and gain or loss on resale if assets are removed from the unit upon churn\nNote that when unit churns but asset is not disposed or sold, it must be kept under fixed assets and depreciated. Churned assets cannot be reclassified back to inventory unless specific criteria are met. Refer Churn Inventory Memo.", "freq": "Monthly", "when": "D+7"}, {"ref": "13.3", "name": "Intangible Assets (Software, Licenses & Brand)", "desc": "", "freq": "", "when": ""}, {"ref": "13.3.1", "name": "Cost Segregation", "desc": "Review Tech team timesheets and AWS/SaaS invoices.\nCapitalize any new features or modules that meet the PIRATE criteria (e.g., the proprietary \"Silkhaus Owner Portal\").\nExpense: Bug fixes, security patches, and research.", "freq": "Monthly", "when": "D+7"}, {"ref": "13.3.2", "name": "Amortization Run", "desc": "Amortize capitalized software (between 3-10 years) and licenses (over the term of the license).", "freq": "Monthly", "when": "D+7"}]},
  {"id": "c14", "num": "14", "name": "Tourism Tax Settlement", "owner": "Simran", "area": "Compliance / Tax", "steps": [{"ref": "14.1", "name": "Dubai Tourism Fee (DET) Settlement", "desc": "The Operations team completes the monthly reporting on the DET portal. They must provide the final DET-generated invoice to the Finance team.\nFinance reconciles the DET invoice against the \"Tourism Tax Liability\" account in NetSuite, which is populated during the revenue recognition phase\nRecord the DET invoice as a Bill in NetSuite under the \"Government/Regulatory\" vendor category. Process the payment via bank transfer during the standard Accounts Payable cycle.", "freq": "Monthly", "when": "D+5"}, {"ref": "14.2", "name": "Abu Dhabi Tourism Tax (DTCM) Settlement", "desc": "Finance pulls the monthly revenue and tourism tax collected data specifically for Abu Dhabi units from Quicksight dashboards (linked to Guesty).\nFinance reports the month's taxable revenue and tax collected to the DTCM over email by the 5th of the following month.\nUpon successful reporting, Finance obtains the official bill/payment reference from the DCT portal.\nUpload the DCT bill into NetSuite, ensuring it is allocated to the correct Abu Dhabi location dimension.\nExecute the payment through the bank portal during the AP cycle.", "freq": "Monthly", "when": "D+5"}]},
  {"id": "c15", "num": "15", "name": "VAT Filing and Settlement", "owner": "Simran", "area": "Compliance / Tax", "steps": [{"ref": "15.1", "name": "Monthly VAT Review & Validation (Pre-Filing)", "desc": "", "freq": "", "when": ""}, {"ref": "15.1.1", "name": "Post-Soft Close Initiation", "desc": "Immediately after the monthly books are \"soft closed\" (D+8), the Finance team triggers the VAT validation cycle.", "freq": "Monthly", "when": "D+8"}, {"ref": "15.1.2", "name": "Data Export to ADS", "desc": "Finance extracts the \"Tax Summary Report\" and \"VAT Register\" from NetSuite, including all guest invoices (Gross Revenue) and vendor bills (Input Tax/RCM). Note that under the FTA ruling, tax invoices from VAT registered landlords will be critical to ensure VAT on the bookings on their properties are passed through to the landlords.", "freq": "Monthly", "when": "D+8"}, {"ref": "15.1.3", "name": "Invoice & Bill Validation", "desc": "In collaboration with ADS, the Finance team performs a line-by-line review of:\nOutput VAT: Confirming 5% VAT is applied to the gross guest fare (Undisclosed Agent model) and management fees.\nInput VAT: Validating that all claimed local bills have a valid TRN and the physical PDF is stored in a google drive.\nReverse Charge (RCM): Ensuring 5% VAT is self-accounted for all international software and service imports (e.g., Guesty, Stripe, Airbnb).", "freq": "Monthly", "when": "D+9"}, {"ref": "15.1.4", "name": "Discrepancy Resolution", "desc": "ADS flags any missing tax invoices or non-compliant bills. Finance must correct these in NetSuite before the period is \"hard locked.\"", "freq": "Monthly", "when": "D+10"}, {"ref": "15.2", "name": "Quarterly VAT Filing & Settlement", "desc": "", "freq": "", "when": ""}, {"ref": "15.2.1", "name": "Quarterly Consolidation", "desc": "On a quarterly basis, ADS prepares the VAT Return (Form VAT201) by aggregating the three previously validated months.", "freq": "Quarterly", "when": "D+15"}, {"ref": "15.2.2", "name": "Management Review & Approval", "desc": "The Finance team reviews the draft return against the NetSuite Trial Balance. Approval is documented internally before ADS submits the return on the FTA portal.", "freq": "Quarterly", "when": "D+20"}, {"ref": "15.2.3", "name": "Filing Submission", "desc": "ADS submits the approved return. The statutory deadline is typically the 28th day of the month following the end of the tax period.", "freq": "Quarterly", "when": "D+20"}, {"ref": "15.2.4", "name": "Payment Notice Generation", "desc": "Upon submission, the FTA portal generates a \"Payment Notice\" with a unique GIBAN or Reference Number.", "freq": "Quarterly", "when": "D+20"}, {"ref": "15.2.5", "name": "Immediate Settlement", "desc": "Finance processes the payment immediately upon receipt of the payment notice to avoid late payment penalties.", "freq": "Quarterly", "when": "D+20"}]},
  {"id": "c16", "num": "16", "name": "Holding Company Accounting", "owner": "Simran", "area": "GL & Reporting", "steps": [{"ref": "16.1", "name": "Monthly Transaction Accounting", "desc": "Record all vendor bills and intercompany fund transfers directly in NetSuite. Given the low transaction volume, these should be processed in a single batch during the close cycle.", "freq": "Monthly", "when": "D+7"}, {"ref": "16.2", "name": "Debt & Interest Management", "desc": "Account for all debt principal payments and calculate/record interest expense (for payables) and interest income (for receivables). Ensure these match the amortization schedules provided by lenders.", "freq": "Monthly", "when": "D+7"}, {"ref": "16.3", "name": "Holding Bank Reconciliations", "desc": "Perform full bank reconciliations for all Holding entity accounts to ensure the General Ledger matches physical statements.", "freq": "Monthly", "when": "D+7"}]},
  {"id": "c17", "num": "17", "name": "Silkhaus India (Tally Integration)", "owner": "Ramesh", "area": "GL & Reporting", "steps": [{"ref": "17.1", "name": "Reporting Receipt", "desc": "The Indian accounting team must provide the monthly financial package (P&L, Balance Sheet, and Trial Balance, including intercompany and equity sub-ledgers) extracted from Tally.", "freq": "Monthly", "when": "D+8"}, {"ref": "17.2", "name": "Data Mapping", "desc": "Review the Tally reports for consistency with IFRS and map the Indian Chart of Accounts to the NetSuite group reporting structure.", "freq": "Monthly", "when": "D+8"}]},
  {"id": "c18", "num": "18", "name": "Intercompany & Group Consolidation", "owner": "Simran", "area": "GL & Reporting", "steps": [{"ref": "18.1", "name": "Intercompany Transaction Review", "desc": "Review all fund transfers and cross-charges between India, UAE, and KSA to validate completeness and accuracy", "freq": "Monthly", "when": "D+9"}, {"ref": "18.2", "name": "Equity & Intercompany Matching", "desc": "Ensure that \"Due From\" (Asset) in one entity exactly matches \"Due To\" (Liability) in the counterparty entity. Resolve any \"In-Transit\" cash discrepancies.", "freq": "Monthly", "when": "D+9"}, {"ref": "18.3", "name": "Elimination of Cross-Charges", "desc": "Perform consolidation entries to eliminate internal revenue and expenses (e.g., people support fees from India to UAE) so they do not appear in the final group P&L.", "freq": "Monthly", "when": "D+9"}, {"ref": "18.4", "name": "Forex", "desc": "Post gain or loss from foreign currency adjustments as applicable. Use period end exchange rates for balance sheet and average monthly exchange rates for P&L", "freq": "Monthly", "when": "D+9"}, {"ref": "18.5", "name": "Production of Consolidated Financials", "desc": "Post elimination of cross charges and any required adjustments for discrepancies between intercompany and equity transactions, produce consolidated P&L, Balance Sheet and Cash Flow statement", "freq": "Monthly", "when": "D+10"}]},

 {id:'f10', num:10, phase:'close', title:'Operating expenses (OpEx)',
  trigger:'Overhead bills and the monthly payroll run land — the cost of running Silkhaus itself.',

function uid(){return 'a'+Math.random().toString(36).slice(2,9)}
function clone(o){return JSON.parse(JSON.stringify(o))}
function readStoredDb(){
  const keys=[LS_KEY,...LEGACY_KEYS];
  for(const key of keys){
    try{
      const raw=localStorage.getItem(key);
      if(!raw)continue;
      const parsed=JSON.parse(raw);
      if(parsed&&parsed.people&&parsed.activities)return {key,db:parsed};
    }catch(e){}
  }
  return null;
}
function load(){
  const stored=readStoredDb();
  if(stored)DB=stored.db;
  if(!DB||!DB.people){DB=clone(SEED);DB.activities.forEach(a=>{a.id=uid();a._home=a.memberId;});DB.processes=clone(PROCESS_SEED);}
  if(!DB.processes)DB.processes=clone(PROCESS_SEED);
  // monthly-close = imported draft from the close-process workbook; per-section owners are proposals to validate
  if(!DB.close)DB.close=clone(CLOSE_SEED);
  // rev-share transaction flow = the spine that links a business event to its accounting treatment, entries, steps & owner
  if(!DB.flow)DB.flow=clone(FLOW_SEED);
  // phase headers (names/descriptions/colours) — seeded once so they become user-editable & persistent
  if(!DB.phases)DB.phases=clone(FLOW_PHASES);
  // proposed-org structure starts as a copy of the real reporting line; edited only in Assign▸Build proposed org
  DB.people.forEach(p=>{if(p.pmanager===undefined)p.pmanager=p.manager||null;});
  // _home = the "before" owner snapshot; live memberId is the "after" (editable in Assign)
  DB.activities.forEach(a=>{if(a._home===undefined)a._home=a.memberId;});
  if(!stored||stored.key!==LS_KEY)save();
}
function save(){
  const json=JSON.stringify(DB);
  try{
    const current=localStorage.getItem(LS_KEY);
    if(current&&current!==json)localStorage.setItem(BACKUP_KEY,JSON.stringify({savedAt:new Date().toISOString(),data:JSON.parse(current)}));
    localStorage.setItem(LS_KEY,json);
    localStorage.setItem("silkhaus_opmodel_v14",json);
  }catch(e){
    alert("Your browser could not save the latest change. Please avoid closing this page until the issue is resolved.");
  }
  _syncSaveToServer(DB);
}

// ── SERVER SYNC ──────────────────────────────────────────────────────
function _getApiKey(){return localStorage.getItem('dashboardApiKey')||'';}
async function _syncSaveToServer(data){
  const k=_getApiKey();if(!k)return;
  try{
    await fetch('/api/data/save',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-API-Key':k},
      body:JSON.stringify({key:'opmodel',data})
    });
  }catch(e){}
}
async function _syncFromServer(){
  const k=_getApiKey();if(!k&&!TEAM_MODE)return;
  try{
    const hdrs=k?{'X-API-Key':k}:{};
    const r=await fetch('/api/data/load?key=opmodel',{headers:hdrs});
    if(!r.ok)return;
    const serverData=await r.json();
    if(!serverData||!serverData.people||!serverData.activities)return;
    DB=serverData;
    DB.people.forEach(p=>{if(p.pmanager===undefined)p.pmanager=p.manager||null;});
    DB.activities.forEach(a=>{if(a._home===undefined)a._home=a.memberId;});
    if(!DB.processes)DB.processes=clone(PROCESS_SEED);
    if(!DB.close)DB.close=clone(CLOSE_SEED);
    if(!DB.flow)DB.flow=clone(FLOW_SEED);
    if(!DB.phases)DB.phases=clone(FLOW_PHASES);
    _migrateCaps();
    localStorage.setItem(LS_KEY,JSON.stringify(DB));
    render();
  }catch(e){}
}
function resetSeed(){if(confirm("Reset all data back to the original seed? Your edits will be lost.")){DB=clone(SEED);DB.activities.forEach(a=>{a.id=uid();a._home=a.memberId;});DB.processes=clone(PROCESS_SEED);DB.close=clone(CLOSE_SEED);DB.flow=clone(FLOW_SEED);DB.phases=clone(FLOW_PHASES);save();render();}}
function normalizeActivities(list){
  return (list||[]).map(a=>{
    const x=Object.assign({},a);
    if(!x.id)x.id=uid();
    if(x._home===undefined)x._home=x.memberId;
    if(!Array.isArray(x.func))x.func=[];
    if(!x.area)x.area=AREAS[0];
    if(!x.freq)x.freq=FREQS[0];
    if(!x.own)x.own=OWNS[0];
    if(!x.complexity)x.complexity=CXS[0];
    return x;
  });
}
function autoRescueActivitiesOnce(){
  try{
    if(localStorage.getItem(ACTIVITY_RESCUE_KEY))return;
    const raw=localStorage.getItem(BACKUP_KEY);
    if(!raw)return;
    const b=JSON.parse(raw);
    const acts=b&&b.data&&Array.isArray(b.data.activities)?b.data.activities:null;
    if(!acts||acts.length<10)return;
    localStorage.setItem(ACTIVITY_PRE_RESCUE_KEY,JSON.stringify({savedAt:new Date().toISOString(),activities:DB.activities}));
    DB.activities=normalizeActivities(acts);
    localStorage.setItem(ACTIVITY_RESCUE_KEY,JSON.stringify({rescuedAt:new Date().toISOString(),sourceSavedAt:b.savedAt||null,count:DB.activities.length}));
    save();
  }catch(e){}
}
function hasLocalBackup(){
  try{
    const raw=localStorage.getItem(BACKUP_KEY);
    if(!raw)return false;
    const b=JSON.parse(raw);
    return !!(b&&b.data&&b.data.activities&&b.data.people);
  }catch(e){return false;}
}
function restoreLocalBackup(){
  try{
    const raw=localStorage.getItem(BACKUP_KEY);
    if(!raw){alert("No local backup was found in this browser.");return;}
    const b=JSON.parse(raw);
    if(!b||!b.data||!b.data.activities){alert("The local backup exists, but it does not look like operating model data.");return;}
    if(!confirm(`Restore the local backup saved ${b.savedAt||'earlier'}? This will replace the currently loaded operating model, but a backup of the current state will be kept first.`))return;
    const current=JSON.stringify(DB);
    localStorage.setItem(BACKUP_KEY,JSON.stringify({savedAt:new Date().toISOString(),data:JSON.parse(current)}));
    DB=b.data;
    DB.people.forEach(p=>{if(p.pmanager===undefined)p.pmanager=p.manager||null;});
    DB.activities.forEach(a=>{if(!a.id)a.id=uid();if(a._home===undefined)a._home=a.memberId;if(!Array.isArray(a.func))a.func=[];});
    save();render();
  }catch(e){
    alert("I could not restore the local backup: "+(e.message||e));
  }
}


/* ───────────────── helpers ───────────────── */
function personById(id){return DB.people.find(p=>p.id===id)}
// OWNER_FIELD flips to "_home" only while rendering the Assign "Before" snapshot, then back to "memberId"
let OWNER_FIELD="memberId";
// In baseline ("_home") mode a brand-new suggested activity (_home==null) has NO current owner,
// so it must NOT fall back to memberId — that keeps it out of the Current snapshot.
function ownerOf(a){return OWNER_FIELD==='_home'?(a._home||null):a.memberId}
function actsOf(id){return DB.activities.filter(a=>ownerOf(a)===id)}
function teamPeople(){return DB.people.filter(p=>!p.lead)}
function reportsTo(id){return DB.people.filter(p=>p.manager===id)}
function propReports(id){return DB.people.filter(p=>p.pmanager===id)}
// true if `nodeId` sits anywhere below `rootId` in the PROPOSED tree (used for cycle-guard)
function isPropDescendant(rootId,nodeId){let cur=personById(nodeId);const seen=new Set();while(cur&&cur.pmanager){if(seen.has(cur.id))break;seen.add(cur.id);if(cur.pmanager===rootId)return true;cur=personById(cur.pmanager);}return false;}
function isExternal(p){return p&&p.type==="External"}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function typeBadge(p){return isExternal(p)?'<span class="bdg bdg-amber">External</span>':'<span class="bdg bdg-gray">Internal</span>';}
// all distinct process areas a person touches, in canonical order
function areasOf(id){const s=new Set(actsOf(id).map(a=>a.area));return AREAS.filter(a=>s.has(a));}
function areaChips(id){const ar=areasOf(id);return ar.length?ar.map(a=>`<span class="chip area">${esc(a)}</span>`).join(""):'<span class="chip">No activities</span>';}

/* ───────────────── analytics ───────────────── */
function hasBackupCover(a){return DB.activities.some(x=>x.id!==a.id&&ownerOf(x)!==ownerOf(a)&&x.area===a.area&&(x.own==="Backup"||x.own==="Shared"));}
function isKeyPerson(a){return a.own==="Sole owner"&&!hasBackupCover(a);}
function keyPersonRisks(){return DB.activities.filter(isKeyPerson);}
const SOD_RULES=[
  {a:"Record",b:"Execute / Pay",sev:"High",label:"Records & Pays the same stream"},
  {a:"__OPERATE__",b:"Reconcile / Review",sev:"High",label:"Self-review (operates & reconciles)"},
  {a:"Authorize",b:"Execute / Pay",sev:"High",label:"Authorises & Executes payment"},
  {a:"Custody",b:"Record",sev:"Medium",label:"Holds custody & records the asset"}
];
function sodConflicts(){
  const out=[];
  DB.people.forEach(p=>{
    const acts=actsOf(p.id).filter(a=>a.own!=="Backup");
    const byArea={};acts.forEach(a=>{(byArea[a.area]=byArea[a.area]||[]).push(a)});
    Object.keys(byArea).forEach(area=>{
      const list=byArea[area];const fset=new Set();list.forEach(a=>a.func.forEach(f=>fset.add(f)));
      const has=f=>f==="__OPERATE__"?(fset.has("Record")||fset.has("Execute / Pay")):fset.has(f);
      SOD_RULES.forEach(r=>{if(has(r.a)&&has(r.b))out.push({sev:r.sev,pid:p.id,person:p.name,area,label:r.label});});
    });
  });
  return out;
}
function sodForPerson(id){return sodConflicts().filter(c=>c.pid===id);}

// Reorder an activity within its owner's column (priority order). dir=-1 up, +1 down.
function moveAct(id,dir){
  const a=DB.activities.find(x=>x.id===id);if(!a)return;
  const f=assignField();const owner=a[f];
  const idxs=DB.activities.map((x,i)=>x[f]===owner?i:-1).filter(i=>i>=0);
  const here=DB.activities.indexOf(a);const pos=idxs.indexOf(here);
  const swap=dir<0?pos-1:pos+1;
  if(swap<0||swap>=idxs.length)return;
  const i1=idxs[pos],i2=idxs[swap];
  const t=DB.activities[i1];DB.activities[i1]=DB.activities[i2];DB.activities[i2]=t;
  save();render();
}

        <div class="pm">

function dropCard(e,pid){

/* ── inline-edit engine — reads/writes DB.flow & DB.phases by path; never touches the seeds ── */
function edMulti(path){return /(:treatment|:note|:desc)$/.test(path);}
// path → {obj,key} : "flow:<id>:a:b" walks DB.flow.find(id).a.b ; "phase:<id>:a" walks DB.phases.find(id).a
function edResolve(path){
  const parts=path.split(':');
  let obj=parts[0]==='flow'?DB.flow.find(s=>s.id===parts[1]):parts[0]==='phase'?DB.phases.find(p=>p.id===parts[1]):null;
  if(!obj)return null;
  for(let i=2;i<parts.length-1;i++){let k=parts[i];if(/^\d+$/.test(k))k=+k;obj=obj[k];if(obj==null)return null;}
  let key=parts[parts.length-1];if(/^\d+$/.test(key))key=+key;
  return {obj,key};
}
function edGet(path){const r=edResolve(path);return r?(r.obj[r.key]??''):'';}
function edSet(path,val){const r=edResolve(path);if(r){r.obj[r.key]=val;save();}}
function edStart(path,ev){
  if(TEAM_MODE)return;
  if(ev){ev.stopPropagation();ev.preventDefault();}
  if(ED_ACTIVE===path)return;
  const el=document.getElementById('ed_'+path);if(!el)return;
  ED_ACTIVE=path;
  const multi=edMulti(path);
  el.classList.add('ed-active');el.classList.remove('ed-empty');
  el.textContent=edGet(path);
  el.contentEditable='true';el.spellcheck=false;el.focus();
  const r=document.createRange();r.selectNodeContents(el);r.collapse(false);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);
  let done=false;
  function finish(commit){
    if(done)return;done=true;
    el.removeEventListener('blur',onBlur);el.removeEventListener('keydown',onKey);
    if(commit)edSet(path,el.innerText.replace(/ /g,' ').replace(/\n{3,}/g,'\n\n').trim());
    ED_ACTIVE=null;render();
  }
  function onBlur(){finish(true);}
  function onKey(e){
    if(e.key==='Escape'){e.preventDefault();finish(false);}
    else if(e.key==='Enter'){if(multi){if(e.metaKey||e.ctrlKey){e.preventDefault();finish(true);}}else{e.preventDefault();finish(true);}}
  }
  el.addEventListener('blur',onBlur);el.addEventListener('keydown',onKey);
}

function flowMoveStage(id,d){
  const s=flowFind(id);if(!s)return;
  const sib=DB.flow.map((x,i)=>x.phase===s.phase?i:-1).filter(i=>i>=0); // indices of same-phase siblings
  const pos=sib.indexOf(DB.flow.indexOf(s)),tgt=pos+d;

/* ───────────────── MONTHLY CLOSE (imported draft) ───────────────── */
function closeWhenNum(w){if(!w)return 999;const m=/D([+-]?)(\d+)/.exec(w);if(!m)return 999;return (m[1]==='-'?-1:1)*parseInt(m[2],10);}
function freqBadge(f){
  if(!f)return '';
  const map={'Weekly':'#0a7d8c','2/Weekly':'#0a7d8c','3/Week':'#0a7d8c','Monthly':'#7a5af0','Quarterly':'#b3590b','Quarterly/Annual':'#b3590b','Annually':'#cf2c35','Annual':'#cf2c35'};
  const c=map[f]||'#516f90';
  return `<span class="cl-freq" style="color:${c};border-color:${c}33;background:${c}11">${esc(f)}</span>`;
}
function whenBadge(w){if(!w)return '';const n=closeWhenNum(w);const c=n<0?'#0a7d8c':(n<=5?'#516f90':(n<=10?'#b3590b':'#cf2c35'));return `<span class="cl-when" style="color:${c};border-color:${c}33">${esc(w)}</span>`;}
function closeStepCount(){return DB.close.reduce((n,s)=>n+s.steps.length,0);}
function setCloseView(v){CLOSE_VIEW=v;render();}
function setCloseArea(a){CLOSE_AREA=a;render();}
function openCloseSec(id){CLOSE_OPEN=CLOSE_OPEN===id?null:id;render();}
function closeAreasPresent(){const s=new Set(DB.close.map(x=>x.area));return AREAS.filter(a=>s.has(a));}
function closeFiltered(){return CLOSE_AREA==='all'?DB.close:DB.close.filter(s=>s.area===CLOSE_AREA);}

function viewClose(){
  const secs=closeFiltered();
  const totalSteps=closeStepCount();
  let h=`<div class="page-head"><h1>Monthly Close</h1><p>The end-to-end monthly accounting close — every workflow, its cadence, and where it sits in the close timeline. Mapped from the close-process workbook so the whole close is visible in one place and ownership can be assigned deliberately.</p></div>`;

  h+=`<div class="hint warn" style="margin-bottom:14px"><b>Imported draft — not yet validated.</b> Steps and descriptions are taken verbatim from <i>Monthly Accounting Close Process_2026</i>. The <b>proposed owner</b> on each section is my mapping to the operating model and needs your confirmation. Nothing here is wired into the Activity master or the curated Processes — it's a standalone close map for review.</div>`;

  // stat row
  h+=`<div class="stats">
    <div class="stat"><div class="n">${DB.close.length}</div><div class="l">Process sections</div></div>
    <div class="stat"><div class="n">${totalSteps}</div><div class="l">Close steps</div></div>
    <div class="stat"><div class="n">${closeAreasPresent().length}</div><div class="l">Functional areas</div></div>
    <div class="stat amb"><div class="n">D-5→D+20</div><div class="l">Close timeline span</div></div>
  </div>`;

  // area filter
  h+=`<div class="cl-filter"><button class="chip ${CLOSE_AREA==='all'?'on':''}" onclick="setCloseArea('all')">All areas</button>`;
  closeAreasPresent().forEach(a=>{h+=`<button class="chip area ${CLOSE_AREA===a?'on':''}" onclick="setCloseArea('${esc(a)}')">${esc(a)}</button>`;});
  h+=`</div>`;

  h+=`<div class="seg">
    <button class="${CLOSE_VIEW==='sections'?'active':''}" onclick="setCloseView('sections')">By process section</button>
    <button class="${CLOSE_VIEW==='timeline'?'active':''}" onclick="setCloseView('timeline')">By close timeline</button>
  </div>`;

  if(CLOSE_VIEW==='sections'){
    secs.forEach(s=>{
      const open=CLOSE_OPEN===s.id;
      h+=`<div class="cl-sec ${open?'open':''}">
        <div class="cl-sec-h" onclick="openCloseSec('${s.id}')">
          <span class="cl-num">${esc(s.num)}</span>
          <span class="cl-name">${esc(s.name)}</span>
          <span class="chip area" style="margin-left:auto">${esc(s.area)}</span>
          <span class="bdg bdg-amber" title="Proposed owner — to validate">Proposed: ${esc(s.owner)}</span>
          <span class="cl-count">${s.steps.length} step${s.steps.length===1?'':'s'}</span>
          <span class="cl-caret">${open?'▾':'▸'}</span>
        </div>`;
      if(open){
        h+=`<div class="cl-steps">`;
        s.steps.forEach(st=>{
          h+=`<div class="cl-step">
            <div class="cl-step-top"><span class="cl-ref">${esc(st.ref)}</span><span class="cl-step-name">${esc(st.name)}</span>${freqBadge(st.freq)}${whenBadge(st.when)}</div>
            ${st.desc?`<div class="cl-desc">${esc(st.desc)}</div>`:''}
          </div>`;
        });
        h+=`</div>`;
      }
      h+=`</div>`;
    });
  } else {
    // timeline: flatten all steps, sort by D+ value
    let rows=[];
    secs.forEach(s=>s.steps.forEach(st=>rows.push(Object.assign({sec:s.name,secnum:s.num,owner:s.owner,area:s.area},st))));
    rows.sort((a,b)=>closeWhenNum(a.when)-closeWhenNum(b.when));
    let lastW=null;
    h+=`<div class="card" style="padding-top:6px">`;
    rows.forEach(r=>{
      const w=r.when||'Unscheduled';
      if(w!==lastW){h+=`<div class="cl-tl-h">${whenBadge(r.when)||'<span class="cl-when" style="color:var(--ink2)">Unscheduled</span>'}</div>`;lastW=w;}
      h+=`<div class="cl-tl-row">
        <div class="cl-tl-main"><span class="cl-ref">${esc(r.ref)}</span> <span class="cl-step-name">${esc(r.name)}</span>
          <div class="cl-tl-sub">${esc(r.secnum)}. ${esc(r.sec)}</div></div>
        <div class="cl-tl-meta">${freqBadge(r.freq)}<span class="bdg bdg-amber">${esc(r.owner)}</span></div>
      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}

function saveActivity(id){
  const func=[...document.querySelectorAll('.f_func:checked')].map(c=>c.value);
  const pid=val('f_member');
  const status=val('f_status'); // 'existing' | 'proposed'
  const data={name:val('f_name').trim(),area:val('f_area'),freq:val('f_freq'),own:val('f_own'),func,complexity:val('f_cx'),handoff:val('f_handoff').trim(),notes:val('f_notes').trim()};
  if(!data.name){alert("Name the activity.");return;}
  if(id){
    const a=DB.activities.find(x=>x.id===id);Object.assign(a,data);
    if(status==='proposed'){a._home=null;a.memberId=pid;}            // tag as proposed-new (out of actuals)
    else{const wasUnmoved=(a.memberId===a._home||a._home==null);a._home=pid;if(wasUnmoved)a.memberId=pid;} // existing: set today-owner; keep proposed move if any
  }
  else{
    data.id=uid();
    if(status==='proposed'){data._home=null;data.memberId=pid;}       // appears in Suggested only
    else{data._home=pid;data.memberId=pid;}                            // existing: appears in Current (and carries into Suggested)
    DB.activities.push(data);
  }
  save();closeModal();render();
}

    (pr.notes||[]).forEach(n=>{m+=`**${n.title}** — ${n.body}\n\n`;});
    if((pr.risks||[]).length){m+=`**Challenges → what needs to change**\n`;pr.risks.forEach(r=>{m+=`- [${r.sev}] ${r.title}: ${r.body}\n   - → Change: ${r.mitigation}\n`;});m+=`\n`;}
    if((pr.suggested||[]).length){m+=`**Target / redesigned process**\n`;pr.suggested.forEach((s,i)=>{m+=`${i+1}. ${s.t}${s.c?`\n   - Why: ${s.c}`:''}\n`;});m+=`\n`;}

/* ───────────────── caps migration ───────────────── */
function _migrateCaps(){
  const KEEP=new Set(['DEWA','ENBD','DTCM','VAT','OTA','DR','CR','GL','PMS','ERP','BDC','NBF','USD','FX','AR','AP','MIS','ADR','SoD','BRS','EBITDA','P&L','A/P','R&M','JE','LL','SOA','WPS','BOQ','AUH','DCT','DET','DIP','IC','IT','ID','INV','AE','WIP','POA','NOC']);
  const fix=s=>typeof s==='string'?s.replace(/\b[A-Z]{2,}(?:-[A-Z]+)*\b/g,w=>KEEP.has(w)?w:w.toLowerCase()):s;
  const fixObj=o=>{if(!o||typeof o!=='object')return false;let c=false;Object.keys(o).forEach(k=>{if(typeof o[k]==='string'){const f=fix(o[k]);if(f!==o[k]){o[k]=f;c=true;}}});return c;};
  let changed=false;
  (DB.flow||[]).forEach(s=>{if(fixObj(s))changed=true;(s.entries||[]).forEach(e=>{if(fixObj(e))changed=true;});});
  (DB.activities||[]).forEach(a=>{if(fixObj(a))changed=true;});
  (DB.processes||[]).forEach(p=>{if(fixObj(p))changed=true;(p.steps||[]).forEach((st,i)=>{if(typeof st==='string'){const f=fix(st);if(f!==st){p.steps[i]=f;changed=true;}}});});
  if(changed)save();
}
